services:
  - type: web
    name: menuclick
    runtime: node
    region: frankfurt
    buildCommand: "corepack enable && corepack prepare pnpm@10.26.1 --activate && pnpm install && PORT=3000 BASE_PATH=/ pnpm --filter @workspace/qr-menu run build"
    startCommand: "PORT=$PORT BASE_PATH=/ pnpm --filter @workspace/qr-menu run serve"
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: NODE_ENV
        value: "production"
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
